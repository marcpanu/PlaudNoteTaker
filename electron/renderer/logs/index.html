<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Logs — Plaud Obsidian Note Taker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar__left">
        <span class="toolbar__title">Activity Log</span>
        <span class="toolbar__count" id="entry-count">0 entries</span>
      </div>
      <div class="toolbar__right">
        <span class="scroll-indicator" id="scroll-indicator" title="Auto-scroll paused — scroll to bottom to resume">⬇ paused</span>
        <button class="btn btn--secondary btn--sm" id="btn-copy" type="button">Copy Logs</button>
        <button class="btn btn--ghost btn--sm" id="btn-clear" type="button">Clear</button>
      </div>
    </header>

    <main class="log-container" id="log-container">
      <!-- Log entries appended here -->
    </main>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
